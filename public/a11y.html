<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>星壤空间站 - 文字版</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px;line-height:1.8}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Noto Sans SC,sans-serif;
  background:#fff;color:#111;padding:2rem 1.5rem;max-width:720px;margin:0 auto
}
h1{font-size:1.6rem;font-weight:700;margin-bottom:.3rem}
h2{font-size:1.2rem;font-weight:600;margin-top:2rem;margin-bottom:.5rem;border-bottom:2px solid #e5e7eb;padding-bottom:.25rem}
h3{font-size:1rem;font-weight:600;margin-top:1.2rem;margin-bottom:.3rem}
p{margin-bottom:.5rem;color:#222}
ul{list-style:disc;padding-left:1.5rem;margin-bottom:.5rem}
li{margin-bottom:.2rem}
hr{border:none;border-top:1px solid #e5e7eb;margin:2rem 0}
.back-link{display:inline-block;margin-top:2rem;padding:.6rem 1.5rem;background:#2563eb;color:#fff;border-radius:999px;font-size:.9rem;font-weight:600;text-decoration:none}
.back-link:hover{background:#1d4ed8}
.footer{margin-top:2rem;font-size:.8rem;color:#6b7280}
.card-id{font-size:.8rem;color:#6b7280;margin-bottom:.1rem}
@media(prefers-color-scheme:dark){
  body{background:#0a0a0a;color:#e5e5e5}
  p{color:#d4d4d4}
  h2{border-bottom-color:#2a2a2a}
  hr{border-top-color:#2a2a2a}
  .card-id{color:#888}
}
</style>
</head>
<body>
<div id="root">
<noscript>
  <p>需要启用 JavaScript 以加载卡片数据。</p>
</noscript>
</div>
<script>
(function(){
  var data;
  try { data = JSON.parse(sessionStorage.getItem('A11Y_DATA') || '{}'); } catch(e) { data = {}; }
  var stacks = data.stacks || [];
  var html = '';
  html += '<h1>星壤空间站 - 纯文字版</h1>';
  html += '<p class="card-id" style="margin-bottom:1.5rem">以下内容根据当前语言配置自动生成。</p>';

  if (stacks.length === 0) {
    html += '<p>暂无卡片数据。请先返回主界面加载内容。</p>';
  } else {
    for (var i = 0; i < stacks.length; i++) {
      var stack = stacks[i];
      html += '<h2>' + (stack.sectionId || '未知区块') + '</h2>';
      var cards = stack.cards || [];
      for (var j = 0; j < cards.length; j++) {
        var card = cards[j];
        html += '<div style="margin-bottom:1rem">';
        if (card.title) {
          html += '<h3>' + card.title + '</h3>';
        }
        if (card.subtitle) {
          html += '<p>' + card.subtitle + '</p>';
        }
        if (card.lines && Array.isArray(card.lines)) {
          html += '<ul>';
          for (var k = 0; k < card.lines.length; k++) {
            html += '<li>' + card.lines[k] + '</li>';
          }
          html += '</ul>';
        }
        if (card.tag) {
          html += '<p><strong>标签：</strong>' + card.tag + '</p>';
        }
        html += '<p class="card-id">卡片 ID：' + (card.id || '') + '</p>';
        html += '</div>';
      }
    }
  }

  html += '<hr>';
  html += '<a class="back-link" href="/">返回主界面</a>';
  html += '<p class="footer">Claylark™ SpaceStation 3.0 无障碍纯文字版</p>';

  document.getElementById('root').innerHTML = html;
})();
</script>
</body>
</html>
